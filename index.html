<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>基因比对算法可视化 | Gene Alignment Visualizer</title>
<style>
  :root {
    --bg-primary: #0d1117;
    --bg-secondary: #161b22;
    --bg-tertiary: #21262d;
    --border: #30363d;
    --text-primary: #e6edf3;
    --text-secondary: #8b949e;
    --accent: #58a6ff;
    --accent-dim: #1f6feb;
    --A-color: #3fb950;
    --T-color: #f85149;
    --G-color: #a371f7;
    --C-color: #ffa657;
    --U-color: #ff7b72;
    --match: #3fb950;
    --mismatch: #f85149;
    --gap: #6e7681;
    --cell-highlight: rgba(88, 166, 255, 0.25);
    --path-color: #ff7b72;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    font-family: 'SF Mono', 'Fira Code', 'Consolas', monospace;
    background: var(--bg-primary);
    color: var(--text-primary);
    min-height: 100vh;
    overflow-x: hidden;
  }
  .container { max-width: 1400px; margin: 0 auto; padding: 20px; }
  header {
    text-align: center;
    padding: 30px 0 20px;
    border-bottom: 1px solid var(--border);
    margin-bottom: 30px;
  }
  header h1 { font-size: 1.8rem; color: var(--accent); letter-spacing: 2px; margin-bottom: 8px; }
  header p { color: var(--text-secondary); font-size: 0.85rem; }
  .algo-tabs { display: flex; gap: 12px; margin-bottom: 24px; flex-wrap: wrap; }
  .algo-tab {
    padding: 10px 24px; border: 1px solid var(--border); border-radius: 8px;
    background: var(--bg-secondary); color: var(--text-secondary); cursor: pointer;
    font-size: 0.9rem; transition: all 0.2s;
  }
  .algo-tab.active { background: var(--accent-dim); color: var(--text-primary); border-color: var(--accent); }
  .algo-tab:hover:not(.active) { border-color: var(--accent); color: var(--text-primary); }
  .input-section {
    background: var(--bg-secondary); border: 1px solid var(--border);
    border-radius: 12px; padding: 24px; margin-bottom: 24px;
  }
  .input-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 20px; margin-bottom: 20px; }
  @media (max-width: 768px) { .input-grid { grid-template-columns: 1fr; } }
  .seq-group { display: flex; flex-direction: column; gap: 8px; }
  .seq-group label { font-size: 0.8rem; color: var(--text-secondary); text-transform: uppercase; letter-spacing: 1px; }
  .seq-group input {
    background: var(--bg-tertiary); border: 1px solid var(--border); border-radius: 6px;
    padding: 12px 14px; color: var(--text-primary); font-size: 1rem;
    font-family: 'SF Mono', monospace; letter-spacing: 1px; outline: none; transition: border-color 0.2s;
  }
  .seq-group input:focus { border-color: var(--accent); }
  .seq-group input::placeholder { color: var(--gap); }
  .controls { display: flex; gap: 12px; flex-wrap: wrap; align-items: center; }
  .controls select, .controls button {
    background: var(--bg-tertiary); border: 1px solid var(--border); border-radius: 6px;
    padding: 10px 16px; color: var(--text-primary); font-size: 0.85rem; cursor: pointer; transition: all 0.2s;
  }
  .controls select:hover, .controls button:hover { border-color: var(--accent); }
  .btn-run { background: var(--accent-dim) !important; border-color: var(--accent) !important; font-weight: 600; }
  .btn-run:hover { background: var(--accent) !important; }
  .btn-reset { background: transparent !important; color: var(--text-secondary) !important; }
  .btn-reset:hover { color: var(--text-primary) !important; }
  .speed-control { display: flex; align-items: center; gap: 10px; margin-left: auto; color: var(--text-secondary); font-size: 0.8rem; }
  .speed-control input[type="range"] { width: 100px; accent-color: var(--accent); }
  .results-section { display: none; gap: 24px; }
  .results-section.visible { display: grid; grid-template-columns: 1fr 1fr; }
  @media (max-width: 1024px) { .results-section.visible { grid-template-columns: 1fr; } }
  .panel { background: var(--bg-secondary); border: 1px solid var(--border); border-radius: 12px; padding: 20px; }
  .panel-title {
    font-size: 0.75rem; text-transform: uppercase; letter-spacing: 2px;
    color: var(--text-secondary); margin-bottom: 16px; padding-bottom: 10px; border-bottom: 1px solid var(--border);
  }
  .matrix-container { overflow: auto; max-height: 400px; border-radius: 6px; border: 1px solid var(--border); }
  table.matrix { border-collapse: collapse; font-size: 0.75rem; }
  table.matrix th, table.matrix td {
    width: 32px; height: 32px; text-align: center;
    border: 1px solid var(--border); font-family: 'SF Mono', monospace;
  }
  table.matrix th { background: var(--bg-tertiary); color: var(--text-secondary); font-weight: normal; position: sticky; top: 0; z-index: 2; }
  table.matrix th:first-child { position: sticky; left: 0; z-index: 3; }
  table.matrix td { background: var(--bg-primary); color: var(--text-primary); }
  table.matrix td.row-header { background: var(--bg-tertiary); color: var(--text-secondary); position: sticky; left: 0; z-index: 1; }
  table.matrix td.diagonal-cell { background: rgba(63, 185, 80, 0.2) !important; }
  table.matrix td.up-cell { background: rgba(163, 113, 247, 0.2) !important; }
  table.matrix td.left-cell { background: rgba(255, 166, 87, 0.2) !important; }
  table.matrix td.trace-path { background: var(--cell-highlight) !important; position: relative; }
  table.matrix td.trace-path::after {
    content: ''; position: absolute; inset: 2px;
    border: 2px solid var(--path-color); border-radius: 2px;
    animation: pathPulse 0.8s ease-in-out infinite;
  }
  @keyframes pathPulse { 0%,100%{opacity:1} 50%{opacity:0.3} }
  .anim-note {
    text-align: center; color: var(--text-secondary); font-size: 0.8rem;
    margin: 12px 0; min-height: 20px;
  }
  .anim-note.active { color: var(--accent); animation: blink 1s infinite; }
  @keyframes blink { 0%,100%{opacity:1} 50%{opacity:0.3} }
  .alignment-display {
    font-family: 'SF Mono', monospace; font-size: 1.1rem; line-height: 2; letter-spacing: 2px; margin-top: 16px; overflow: auto;
  }
  .alignment-row { display: flex; flex-wrap: wrap; gap: 0; }
  .align-base { width: 24px; height: 28px; display: inline-flex; align-items: center; justify-content: center; font-weight: 600; }
  .base-A { color: var(--A-color); }
  .base-T, .base-U { color: var(--T-color); }
  .base-G { color: var(--G-color); }
  .base-C { color: var(--C-color); }
  .base-gap { color: var(--gap); }
  .char-match { color: var(--match); }
  .char-mismatch { color: var(--mismatch); }
  .char-gap { color: var(--gap); }
  .alignment-labels { font-size: 0.7rem; color: var(--text-secondary); margin-top: 8px; display: flex; justify-content: space-between; padding: 0 4px; }
  .score-display {
    margin-top: 16px; padding: 12px 16px; background: var(--bg-tertiary);
    border-radius: 6px; font-size: 0.85rem; display: flex; gap: 24px; flex-wrap: wrap;
  }
  .score-item span { color: var(--accent); font-weight: 600; margin-left: 4px; }
  .legend { display: flex; gap: 16px; flex-wrap: wrap; margin-top: 16px; font-size: 0.75rem; color: var(--text-secondary); }
  .legend-item { display: flex; align-items: center; gap: 6px; }
  .legend-dot { width: 10px; height: 10px; border-radius: 50%; }
  .error-msg {
    background: rgba(248,81,73,0.1); border: 1px solid var(--mismatch); border-radius: 6px;
    padding: 12px; color: var(--mismatch); font-size: 0.85rem; margin-top: 12px; display: none;
  }
  .error-msg.visible { display: block; }
  .params-display {
    font-size: 0.75rem; color: var(--text-secondary); margin-top: 12px;
    padding: 8px 12px; background: var(--bg-tertiary); border-radius: 4px; display: flex; gap: 20px; flex-wrap: wrap;
  }
  .params-display span { color: var(--accent); }
</style>
</head>
<body>
<div class="container">
  <header>
    <h1>🧬 基因比对算法可视化</h1>
    <p>Needleman-Wunsch 全局比对 &nbsp;|&nbsp; Smith-Waterman 局部比对</p>
  </header>

  <div class="algo-tabs">
    <div class="algo-tab active" data-algo="nw">全局比对 (NW)</div>
    <div class="algo-tab" data-algo="sw">局部比对 (SW)</div>
  </div>

  <div class="input-section">
    <div class="input-grid">
      <div class="seq-group">
        <label>序列 1 (Seq1)</label>
        <input type="text" id="seq1" placeholder="DNA: GATTACA | RNA: GAUUACA | Protein: RKHA" value="GATTACA" maxlength="30">
      </div>
      <div class="seq-group">
        <label>序列 2 (Seq2)</label>
        <input type="text" id="seq2" placeholder="DNA: GCATGCAT | RNA: GCAUGCAU | Protein: RKCA" value="GCATGCAT" maxlength="30">
      </div>
    </div>
    <div class="controls">
      <select id="seqType">
        <option value="dna">DNA</option>
        <option value="rna">RNA</option>
        <option value="protein">蛋白质</option>
      </select>
      <button class="btn-run" id="runBtn">▶ 运行比对</button>
      <button class="btn-reset" id="resetBtn">↺ 重置</button>
      <div class="speed-control">
        <span>🐢</span>
        <input type="range" id="speedRange" min="1" max="100" value="50">
        <span>🐇</span>
      </div>
    </div>
    <div class="params-display" id="paramsDisplay">
      比对得分: <span>Match=+2, Mismatch=−1, Gap=−2</span>
    </div>
    <div class="error-msg" id="errorMsg"></div>
  </div>

  <div class="results-section" id="results">
    <div class="panel">
      <div class="panel-title">计分矩阵 (Scoring Matrix)</div>
      <div class="anim-note" id="animNote">点击「运行比对」开始动画</div>
      <div class="matrix-container" id="matrixContainer"></div>
      <div class="score-display" id="scoreDisplay"></div>
      <div class="legend">
        <div class="legend-item"><div class="legend-dot" style="background:var(--A-color)"></div>腺嘌呤 A</div>
        <div class="legend-item"><div class="legend-dot" style="background:var(--T-color)"></div>胸腺嘧啶 T</div>
        <div class="legend-item"><div class="legend-dot" style="background:var(--G-color)"></div>鸟嘌呤 G</div>
        <div class="legend-item"><div class="legend-dot" style="background:var(--C-color)"></div>胞嘧啶 C</div>
      </div>
    </div>
    <div class="panel">
      <div class="panel-title">比对结果 (Alignment)</div>
      <div class="alignment-display" id="alignmentDisplay"></div>
      <div class="alignment-labels">
        <span id="alignLabel1">Seq1</span>
        <span id="alignLabel2">Seq2</span>
      </div>
    </div>
  </div>
</div>

<script>
const BASE_COLORS = { A: 'base-A', T: 'base-T', U: 'base-U', G: 'base-G', C: 'base-C' };
let currentAlgo = 'nw';
let animSpeed = 50;
let isAnimating = false;
let cancelAnim = false;
const ANIM_DELAY_MS = 120;

const seq1Input = document.getElementById('seq1');
const seq2Input = document.getElementById('seq2');
const seqTypeSelect = document.getElementById('seqType');
const runBtn = document.getElementById('runBtn');
const resetBtn = document.getElementById('resetBtn');
const speedRange = document.getElementById('speedRange');
const resultsEl = document.getElementById('results');
const matrixContainer = document.getElementById('matrixContainer');
const animNote = document.getElementById('animNote');
const scoreDisplay = document.getElementById('scoreDisplay');
const alignmentDisplay = document.getElementById('alignmentDisplay');
const errorMsg = document.getElementById('errorMsg');
const paramsDisplay = document.getElementById('paramsDisplay');

document.querySelectorAll('.algo-tab').forEach(tab => {
  tab.addEventListener('click', () => {
    document.querySelectorAll('.algo-tab').forEach(t => t.classList.remove('active'));
    tab.classList.add('active');
    currentAlgo = tab.dataset.algo;
    updateParamsDisplay();
  });
});

seqTypeSelect.addEventListener('change', updateParamsDisplay);

function updateParamsDisplay() {
  const type = seqTypeSelect.value;
  const label = type === 'protein' ? 'Protein' : type.toUpperCase();
  paramsDisplay.innerHTML = `序列类型: <span>${label}</span> &nbsp;|&nbsp; 比对算法: <span>${currentAlgo === 'nw' ? 'Needleman-Wunsch (全局)' : 'Smith-Waterman (局部)'}</span> &nbsp;|&nbsp; 计分: <span>Match=+2, Mismatch=−1, Gap=−2</span>`;
}

speedRange.addEventListener('input', e => { animSpeed = parseInt(e.target.value); });
runBtn.addEventListener('click', runAlignment);
resetBtn.addEventListener('click', resetAll);

function validateSeq(seq, type) {
  const upper = seq.toUpperCase();
  const patterns = {
    dna: /^[ATGC]+$/,
    rna: /^[AUGC]+$/,
    protein: /^[ACDEFGHIKLMNPQRSTVWY]+$/i
  };
  if (!patterns[type].test(upper)) {
    const allowed = type === 'protein' ? '20种氨基酸字母' : type === 'rna' ? 'A/U/G/C' : 'A/T/G/C';
    throw new Error(`序列包含非法字符。${type.toUpperCase()}序列只允许: ${allowed}`);
  }
  return upper;
}

function getScore(a, b) {
  if (a === b) return 2;
  return -1;
}

function buildMatrix(seq1, seq2) {
  const m = seq1.length, n = seq2.length;
  const dp = Array.from({length: m + 1}, () => Array(n + 1).fill(0));
  const ptr = Array.from({length: m + 1}, () => Array(n + 1).fill(null));

  for (let i = 1; i <= m; i++) { dp[i][0] = currentAlgo === 'nw' ? i * -2 : 0; ptr[i][0] = 'up'; }
  for (let j = 1; j <= n; j++) { dp[0][j] = currentAlgo === 'nw' ? j * -2 : 0; ptr[0][j] = 'left'; }

  for (let i = 1; i <= m; i++) {
    for (let j = 1; j <= n; j++) {
      const diag = dp[i-1][j-1] + getScore(seq1[i-1], seq2[j-1]);
      const up = dp[i-1][j] - 2;
      const left = dp[i][j-1] - 2;
      if (currentAlgo === 'nw') {
        dp[i][j] = Math.max(diag, up, left);
      } else {
        dp[i][j] = Math.max(0, diag, up, left);
      }
      if (dp[i][j] === diag) ptr[i][j] = 'diag';
      else if (dp[i][j] === up) ptr[i][j] = 'up';
      else ptr[i][j] = 'left';
      if (currentAlgo === 'sw' && dp[i][j] === 0) ptr[i][j] = null;
    }
  }
  return { dp, ptr };
}

function traceback(seq1, seq2, ptr, dp) {
  let i = seq1.length, j = seq2.length;
  const path = [];

  if (currentAlgo === 'sw') {
    let maxS = -Infinity, maxI = 0, maxJ = 0;
    for (let ii = 1; ii <= i; ii++)
      for (let jj = 1; jj <= j; jj++)
        if (dp[ii][jj] > maxS) { maxS = dp[ii][jj]; maxI = ii; maxJ = jj; }
    i = maxI; j = maxJ;
  }

  while (i > 0 || j > 0) {
    path.push({ i, j });
    if (i === 0) { j--; }
    else if (j === 0) { i--; }
    else {
      if (currentAlgo === 'sw' && ptr[i][j] === null) break;
      const dir = ptr[i][j];
      if (dir === 'diag') { i--; j--; }
      else if (dir === 'up') { i--; }
      else { j--; }
    }
    if (i === 0 && j === 0) break;
  }

  // Reconstruct alignment from path
  // path is built in backtrack order: [end->start], so we iterate k=0 to length-1 (start->end)
  // delta = current - next (going backward in path = forward in alignment)
  let align1 = '', align2 = '';
  for (let k = 0; k < path.length; k++) {
    const { i: pi, j: pj } = path[k];
    const next = k < path.length - 1 ? path[k + 1] : { i: 0, j: 0 };
    const delta_i = pi - next.i;
    const delta_j = pj - next.j;
    if (delta_i === 1 && delta_j === 1) { align1 = seq1[pi-1] + align1; align2 = seq2[pj-1] + align2; }
    else if (delta_i === 1 && delta_j === 0) { align1 = seq1[pi-1] + align1; align2 = '-' + align2; }
    else if (delta_i === 0 && delta_j === 1) { align1 = '-' + align1; align2 = seq2[pj-1] + align2; }
  }

  const finalScore = currentAlgo === 'sw'
    ? Math.max(...dp.flat())
    : dp[seq1.length][seq2.length];

  return { align1, align2, path, score: finalScore };
}

function renderMatrix(seq1, seq2, dp) {
  const m = seq1.length, n = seq2.length;
  let html = '<table class="matrix"><thead><tr><th></th><th></th>';
  for (let j = 0; j < n; j++) html += `<th class="col-hdr">${seq2[j]}</th>`;
  html += '</tr></thead><tbody>';
  for (let i = 0; i <= m; i++) {
    html += '<tr>';
    html += i === 0 ? '<th></th>' : `<th class="row-header">${seq1[i-1]}</th>`;
    for (let j = 0; j <= n; j++) {
      const val = dp[i][j];
      html += `<td id="cell-${i}-${j}" data-dir="">${val}</td>`;
    }
    html += '</tr>';
  }
  html += '</tbody></table>';
  return html;
}

function getDelay() { return Math.max(5, Math.round((100 - animSpeed) * 1.5)); }

async function sleep(ms) { return new Promise(r => setTimeout(r, ms)); }

async function animateMatrixFill(seq1, seq2, dp, ptr) {
  const m = seq1.length, n = seq2.length;
  for (let i = 1; i <= m; i++) {
    for (let j = 1; j <= n; j++) {
      if (cancelAnim) return;
      const cell = document.getElementById(`cell-${i}-${j}`);
      if (!cell) continue;
      const dir = ptr[i][j];
      cell.dataset.dir = dir;
      cell.classList.add(dir === 'diag' ? 'diagonal-cell' : dir === 'up' ? 'up-cell' : 'left-cell');
      await sleep(getDelay());
    }
  }
}

async function animateTraceback(path) {
  animNote.textContent = '🔄 回溯路径动画中...';
  animNote.classList.add('active');
  for (const { i, j } of path) {
    if (cancelAnim) return;
    const cell = document.getElementById(`cell-${i}-${j}`);
    if (cell) { cell.classList.add('trace-path'); }
    await sleep(getDelay() * 1.5);
  }
  animNote.classList.remove('active');
}

function renderAlignment(align1, align2) {
  let html1 = '<div class="alignment-row">', html2 = '<div class="alignment-row">';
  for (let k = 0; k < align1.length; k++) {
    const a = align1[k], b = align2[k];
    const match = a !== '-' && b !== '-' && a === b;
    const gapA = a === '-', gapB = b === '-';
    const cls = match ? 'char-match' : (gapA || gapB) ? 'char-gap' : 'char-mismatch';
    const aColor = BASE_COLORS[a] || (gapA ? 'base-gap' : '');
    const bColor = BASE_COLORS[b] || (gapB ? 'base-gap' : '');
    html1 += `<span class="align-base ${cls} ${aColor}">${a}</span>`;
    html2 += `<span class="align-base ${cls} ${bColor}">${b}</span>`;
  }
  html1 += '</div>'; html2 += '</div>';
  return html1 + '<div style="height:4px"></div>' + html2;
}

async function runAlignment() {
  if (isAnimating) { cancelAnim = true; await sleep(200); isAnimating = false; runBtn.textContent = '▶ 运行比对'; runBtn.disabled = false; animNote.classList.remove('active'); return; }

  const s1 = seq1Input.value.trim(), s2 = seq2Input.value.trim();
  const type = seqTypeSelect.value;

  try {
    const seq1 = validateSeq(s1, type);
    const seq2 = validateSeq(s2, type);
    if (!seq1 || !seq2) throw new Error('请输入两条序列');

    errorMsg.classList.remove('visible');
    document.getElementById('alignLabel1').textContent = seq1;
    document.getElementById('alignLabel2').textContent = seq2;

    const { dp, ptr } = buildMatrix(seq1, seq2);

    resultsEl.classList.add('visible');
    animNote.textContent = '🔄 填充计分矩阵...';
    animNote.classList.add('active');
    animNote.classList.remove('hidden');
    matrixContainer.innerHTML = renderMatrix(seq1, seq2, dp);

    isAnimating = true; runBtn.textContent = '⏸ 停止'; runBtn.disabled = false;

    await animateMatrixFill(seq1, seq2, dp, ptr);
    if (cancelAnim) return;

    const { align1, align2, path, score } = traceback(seq1, seq2, ptr, dp);

    await animateTraceback(path);
    if (cancelAnim) return;

    alignmentDisplay.innerHTML = renderAlignment(align1, align2);
    scoreDisplay.innerHTML = `
      <div class="score-item">比对得分: <span>${score}</span></div>
      <div class="score-item">Seq1: <span>${seq1.length} bp/aa</span></div>
      <div class="score-item">Seq2: <span>${seq2.length} bp/aa</span></div>
      <div class="score-item">算法: <span>${currentAlgo === 'nw' ? 'NW-全局' : 'SW-局部'}</span></div>
    `;
    animNote.textContent = '✅ 比对完成！';

  } catch (err) {
    errorMsg.textContent = '❌ ' + err.message;
    errorMsg.classList.add('visible');
  } finally {
    isAnimating = false;
    runBtn.textContent = '▶ 运行比对';
    runBtn.disabled = false;
    animNote.classList.remove('active');
  }
}

function resetAll() {
  cancelAnim = true;
  isAnimating = false;
  resultsEl.classList.remove('visible');
  matrixContainer.innerHTML = '';
  alignmentDisplay.innerHTML = '';
  scoreDisplay.innerHTML = '';
  animNote.textContent = '点击「运行比对」开始动画';
  animNote.classList.remove('active');
  errorMsg.classList.remove('visible');
  runBtn.textContent = '▶ 运行比对';
  runBtn.disabled = false;
  seq1Input.value = 'GATTACA';
  seq2Input.value = 'GCATGCAT';
  seqTypeSelect.value = 'dna';
  currentAlgo = 'nw';
  document.querySelectorAll('.algo-tab').forEach(t => t.classList.remove('active'));
  document.querySelector('[data-algo=nw]').classList.add('active');
  updateParamsDisplay();
}

updateParamsDisplay();
</script>
</body>
</html>
